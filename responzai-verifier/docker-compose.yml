version: "3.8"

services:
  # ─────────────────────────────────────────
  # PostgreSQL mit pgvector
  # Die Datenbank für Claims und Embeddings
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: responzai-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # n8n Automatisierung
  # Steuert die automatischen Prüfläufe
  # ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n
    container_name: responzai-n8n
    restart: always
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_SENDER=${SMTP_SENDER}
    volumes:
      - n8ndata:/home/node/.n8n
    ports:
      - "5678:5678"

  # ─────────────────────────────────────────
  # responzai Verifier API
  # Die Pipeline mit allen 8 Agenten
  # ─────────────────────────────────────────
  verifier:
    build: .
    container_name: responzai-verifier
    restart: always
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  n8ndata:
